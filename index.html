<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .mainbox {
        height: 400px;
        width: 400px;
        background-color: red;
        display: flex;
        align-items: center;
        flex-direction: column;
      }
      .sword-blade {
        height: 70%;
        width: 20%;
        border-top-left-radius: 50%;
        border-top-right-radius: 50%;
        background-color: silver;
        display: flex;
        justify-content: center;
        border: 1px solid black;
      }
      .black-line {
        height: 100%;
        width: 1px;
        background-color: black;
      }
      .sword-quillion {
        height: 5%;
        width: 30%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background-color: chocolate;
        border: 1px solid black;
        border-radius: 25px;
      }
      .rhs {
        width: 10%;
        height: 150%;
        background-color: gold;
        border-radius: 50%;
        border: 1px solid black;
      }
      .sword-handle {
        width: 10%;
        height: 25%;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .golden-grip {
        width: 150%;
        height: 20%;
        background-color: gold;
        border-radius: 20px;
        border: 1px solid black;
      }
      .brown-grip {
        width: 125%;
        height: 20%;
        background-color: chocolate;
        border-radius: 20px;
        border: 1px solid black;
      }
      .end-grip {
        width: 200%;
        height: 20%;
        background-color: gold;
        border-radius: 20px;
        border: 1px solid black;
      }
    </style>
  </head>
  <body>
    <div class="mainbox">
      <div class="sword-blade">
        <div class="black-line"></div>
      </div>
      <div class="sword-quillion">
        <div class="rhs"></div>
        <div class="rhs"></div>
      </div>
      <div class="sword-handle">
        <div class="golden-grip"></div>
        <div class="brown-grip"></div>
        <div class="golden-grip"></div>
        <div class="brown-grip"></div>
        <div class="golden-grip"></div>
        <div class="brown-grip"></div>
        <div class="end-grip"></div>
      </div>
    </div>
  </body>
</html>
